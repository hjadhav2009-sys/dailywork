plugins {
    id "com.android.application"
}

android {
    namespace "com.dailywork.worker"
    compileSdk 35

    defaultConfig {
        applicationId "com.dailywork.worker"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.journeyapps:zxing-android-embedded:4.3.0"
}
